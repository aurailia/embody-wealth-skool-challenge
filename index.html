<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build Your Skool Community · 21-Day Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --night:#0a1018;
  --night-2:#0f1923;
  --plum-deep:#12202d;
  --plum:#1b3242;
  --plum-glass:rgba(30,58,78,0.42);
  --lavender:#9fd4e0;
  --lavender-soft:#c4e6ee;
  --lavender-bright:#b6e2ec;
  --gold:#e89ec4;
  --pink:#f0a8cd;
  --pink-soft:#f6c4dd;
  --lilac:#b9a8e0;
  --lilac-soft:#d7cdee;
  --text:#e8eef2;
  --text-soft:#c3d4dd;
  --text-dim:#94aab6;
  --cream:#f4ece0;
  --line:rgba(127,181,196,0.16);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{
  font-family:var(--sans);
  color:var(--text);
  /* ====== BACKGROUND IMAGE ======
     Paste your image URL between the url('') quotes below.
     Leave it empty to use the deep ink gradient fallback. */
  --bg-image:url('background.jpg');
  background:#0a1018;
  background-image:
    /* light ink veil ON TOP of your image (lets the colors show) */
    linear-gradient(165deg, rgba(12,18,28,0.34) 0%, rgba(16,26,38,0.28) 45%, rgba(20,34,48,0.40) 100%),
    /* your image */
    var(--bg-image),
    /* fallback ink wash if no image is set */
    linear-gradient(165deg, #0a1018 0%, #0f1923 45%, #12202d 100%);
  background-size:cover, cover, cover;
  background-position:center, center, center;
  background-repeat:no-repeat, no-repeat, no-repeat;
  background-attachment:fixed, fixed, fixed;
  -webkit-font-smoothing:antialiased;
}
/* soft sparkle, kept light-touch */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(circle at 8% 8%, rgba(240,168,205,0.12) 0%, rgba(240,168,205,0) 20%),
    radial-gradient(1.5px 1.5px at 14% 26%, rgba(174,214,224,0.6) 50%, transparent 51%),
    radial-gradient(1px 1px at 78% 14%, rgba(174,214,224,0.45) 50%, transparent 51%),
    radial-gradient(1.5px 1.5px at 62% 60%, rgba(201,164,221,0.4) 50%, transparent 51%),
    radial-gradient(1px 1px at 34% 74%, rgba(174,214,224,0.4) 50%, transparent 51%),
    radial-gradient(1.5px 1.5px at 88% 66%, rgba(174,214,224,0.4) 50%, transparent 51%),
    radial-gradient(1px 1px at 24% 50%, rgba(201,164,221,0.35) 50%, transparent 51%);
  opacity:0.9;
}

.wrap{position:relative;z-index:1;max-width:1240px;margin:0 auto;padding:0 28px 80px}
#confetti{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:999}

/* ---------- HEADER (sticky, dark frosted band) ---------- */
header.masthead{
  position:sticky;top:14px;z-index:50;
  margin:14px 0 26px;
  padding:22px 30px;
  display:flex;align-items:center;justify-content:space-between;
  gap:24px;flex-wrap:wrap;
  background:linear-gradient(120deg, rgba(20,32,46,0.72) 0%, rgba(15,25,38,0.78) 100%);
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  border:1px solid rgba(174,214,224,0.28);
  border-radius:22px;
  box-shadow:0 18px 50px rgba(60,40,95,0.35), inset 0 1px 0 rgba(255,255,255,0.12);
}
.brand{display:flex;align-items:center;gap:20px}
.brand-tile{
  width:62px;height:62px;border-radius:18px;flex:0 0 auto;
  background:linear-gradient(150deg, #f0a8cd 0%, #c9a4dd 48%, #7fb5c4 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 22px rgba(20,49,64,0.5), inset 0 1px 2px rgba(255,255,255,0.5);
}
.brand-tile svg{width:30px;height:30px;color:#2a1f3d}
.brand-text{display:flex;flex-direction:column;gap:5px}
.brand-name{
  font-family:var(--serif);font-weight:600;
  font-size:38px;line-height:1.05;letter-spacing:0.3px;
  background:linear-gradient(100deg, #f0a8cd 0%, #c9a4dd 40%, #aed6e0 78%, #7fb5c4 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;
}
.brand-name em{font-style:italic;font-weight:500}
.brand-sub{
  font-family:var(--sans);font-size:11.5px;font-weight:600;letter-spacing:3.5px;
  text-transform:uppercase;color:var(--text-dim);
}
.masthead-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:7px}
.ready-label{
  font-family:var(--sans);font-size:11.5px;font-weight:600;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--text-soft);
}

/* ---------- LAYOUT ---------- */
.layout{display:grid;grid-template-columns:300px minmax(0,1fr);gap:30px;align-items:start}

/* ---------- PATH SIDEBAR (dark glass) ---------- */
aside.path{
  position:sticky;top:120px;
  background:linear-gradient(160deg, rgba(22,34,48,0.74) 0%, rgba(16,26,40,0.80) 100%);
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  border:1px solid rgba(174,214,224,0.22);
  border-radius:24px;
  padding:26px 22px 28px;
  box-shadow:0 18px 50px rgba(8,16,28,0.45);
}
.path-eyebrow{
  display:flex;align-items:center;gap:7px;
  font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:3px;
  text-transform:uppercase;color:var(--lavender);margin-bottom:6px;padding-left:2px;
}
.path-title{
  font-family:var(--serif);font-weight:600;font-size:23px;
  margin-bottom:16px;padding-left:2px;line-height:1.1;
  background:linear-gradient(100deg, #f0a8cd 0%, #c9a4dd 48%, #aed6e0 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;
}
.progress-track{height:5px;border-radius:3px;background:rgba(185,168,224,0.16);overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--lavender),var(--lavender-bright));width:0%;transition:width .4s ease}
.progress-label{font-family:var(--sans);font-size:11px;color:var(--text-dim);margin-bottom:20px;letter-spacing:.5px}

.welcome-link{
  display:flex;align-items:center;gap:13px;
  padding:13px 12px;border-radius:14px;cursor:pointer;margin-bottom:14px;
  background:linear-gradient(120deg, rgba(58,122,140,0.2), rgba(20,49,64,0.12));
  border:1px solid rgba(185,168,224,0.28);transition:background .16s ease;
}
.welcome-link:hover{background:linear-gradient(120deg, rgba(58,122,140,0.32), rgba(20,49,64,0.2))}
.welcome-link.active{
  background:linear-gradient(120deg, rgba(127,181,196,0.45), rgba(58,122,140,0.32));
  box-shadow:0 4px 16px rgba(0,0,0,0.28);
}
.welcome-spark{
  width:34px;height:34px;flex:0 0 auto;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  background:linear-gradient(150deg,#9fcdd9,#2d6577);color:#2a1f3d;
  box-shadow:0 4px 12px rgba(20,49,64,0.45);
}
.welcome-text{display:flex;flex-direction:column;gap:1px}
.welcome-link .day-num{color:var(--lavender)}
.welcome-link .day-name{font-family:var(--serif);font-weight:600;font-size:18px;color:#fff;line-height:1.15}

.phase{margin-bottom:6px}
.phase-head{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  gap:10px;background:none;border:none;cursor:pointer;
  padding:10px 8px;border-radius:12px;text-align:left;
  transition:background .18s ease;
}
.phase-head:hover{background:rgba(185,168,224,0.1)}
.phase-title-wrap{display:flex;flex-direction:column;gap:2px}
.phase-kicker{
  font-family:var(--sans);font-size:9.5px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--lavender);
}
.phase-name{font-family:var(--serif);font-weight:600;font-size:20px;color:var(--text);line-height:1.1}
.phase-caret{
  width:18px;height:18px;flex:0 0 auto;color:var(--lavender);opacity:.75;
  transition:transform .22s ease;
}
.phase.collapsed .phase-caret{transform:rotate(-90deg)}
.phase-days{
  position:relative;margin:2px 0 8px 14px;padding-left:18px;
  overflow:hidden;transition:max-height .28s ease, opacity .22s ease;
}
.phase.collapsed .phase-days{max-height:0 !important;opacity:0;margin-bottom:0}
.phase-days::before{
  content:"";position:absolute;left:5px;top:10px;bottom:10px;width:1.5px;
  background:linear-gradient(180deg, rgba(185,168,224,0.55), rgba(185,168,224,0.15));
}
.day-link{
  position:relative;display:flex;flex-direction:column;gap:2px;
  padding:9px 10px 9px 6px;border-radius:11px;cursor:pointer;
  transition:background .16s ease;
}
.day-link:hover{background:rgba(185,168,224,0.1)}
.day-link.active{
  background:linear-gradient(120deg, rgba(58,122,140,0.42), rgba(20,49,64,0.3));
  box-shadow:0 4px 16px rgba(0,0,0,0.28);
}
.day-link::before{
  content:"";position:absolute;left:-17px;top:14px;width:11px;height:11px;border-radius:50%;
  background:#241a3a;border:1.5px solid var(--lavender);
  box-shadow:0 0 0 3px rgba(28,20,48,0.9);
}
.day-link.active::before{
  background:radial-gradient(circle at 35% 30%, #fff, var(--lavender));
  box-shadow:0 0 12px rgba(185,168,224,0.95), 0 0 0 3px rgba(28,20,48,0.9);
}
.day-link.done::before{background:var(--lavender);border-color:var(--lavender)}
.day-num{font-family:var(--sans);font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim)}
.day-link.active .day-num{color:var(--lavender-soft)}
.day-name{font-family:var(--serif);font-weight:500;font-size:18px;color:var(--text-soft);line-height:1.18}
.day-link.active .day-name{color:#fff}
.day-link.locked{opacity:.5;position:relative}
.day-link.locked .day-name{font-style:italic}
.day-link.locked:hover{background:transparent;cursor:default}
.lock-ico{position:absolute;right:14px;top:50%;transform:translateY(-50%);opacity:.7}
.lock-ico svg{width:14px;height:14px;display:block;color:var(--lavender-soft)}

/* locked day screen */
.locked-screen{
  display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:48px 30px 40px;
}
.locked-ring{
  width:74px;height:74px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg, rgba(58,122,140,0.3), rgba(45,101,119,0.2));
  border:1px solid rgba(174,214,224,0.32);margin-bottom:22px;
}
.locked-ring svg{width:30px;height:30px;color:var(--lavender-soft)}
.locked-title{
  font-family:var(--serif);font-weight:600;font-size:30px;color:#fff;margin-bottom:12px;
}
.locked-text{
  font-family:var(--sans);font-size:16.5px;line-height:1.65;color:var(--text-soft);
  max-width:460px;margin:0;
}

/* ---------- CONTENT STAGE (on dark) ---------- */
main.stage{
  background:linear-gradient(165deg, rgba(20,30,44,0.82) 0%, rgba(14,22,34,0.86) 100%);
  -webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
  border:1px solid rgba(174,214,224,0.18);
  border-radius:28px;
  padding:48px 54px 56px;
  box-shadow:0 24px 70px rgba(8,16,28,0.5);
  min-height:560px;
}
.day-topline{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.topline-spacer{flex:1 1 auto}
.watch-btn{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--sans);font-size:12.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--lavender-soft);
  background:linear-gradient(120deg, rgba(58,122,140,0.32), rgba(45,101,119,0.26));
  border:1px solid rgba(174,214,224,0.34);
  border-radius:30px;padding:9px 18px;cursor:pointer;transition:all .15s ease;
}
.watch-btn svg{width:15px;height:15px;flex:0 0 auto}
.watch-btn:hover{background:linear-gradient(120deg, rgba(58,122,140,0.45), rgba(45,101,119,0.38));color:#fff}
.watch-btn.active{background:linear-gradient(120deg,#3a7a8c,#2d6577);color:#fff;border-color:transparent}
.watch-btn.soon{opacity:0.55;cursor:default;color:var(--text-dim)}

/* video modal */
.video-modal{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  padding:24px;opacity:0;pointer-events:none;
  transition:opacity .25s ease;
}
.video-modal.open{opacity:1;pointer-events:auto}
.video-modal-backdrop{
  position:absolute;inset:0;
  background:rgba(6,10,18,0.7);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
}
.video-modal-inner{
  position:relative;z-index:1;width:100%;max-width:960px;
  transform:scale(0.96);transition:transform .25s ease;
}
.video-modal.open .video-modal-inner{transform:scale(1)}
.video-modal-frame{
  position:relative;width:100%;padding-bottom:56.25%;height:0;
  border-radius:16px;overflow:hidden;
  background:#0a0f18;
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
  border:1px solid rgba(174,214,224,0.25);
}
.video-modal-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.video-modal-close{
  position:absolute;top:-16px;right:-8px;z-index:2;
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#f0a8cd,#c9a4dd);color:#2a2440;
  border:none;font-size:28px;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 22px rgba(0,0,0,0.4);transition:transform .15s ease;
}
.video-modal-close:hover{transform:scale(1.08)}
@media (max-width:860px){
  .video-modal{padding:16px}
  .video-modal-close{top:-52px;right:0}
}
.day-meta{font-family:var(--sans);font-size:12.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)}
.video-chip{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--sans);font-size:12.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--lavender-soft);background:rgba(185,168,224,0.12);
  border:1px solid rgba(185,168,224,0.28);border-radius:30px;padding:8px 16px;cursor:pointer;
  transition:background .15s ease;
}
.video-chip:hover{background:rgba(185,168,224,0.2)}
.video-chip svg{width:15px;height:15px}

.day-headrow{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:14px;flex-wrap:wrap}
.day-title{
  font-family:var(--serif);font-weight:600;font-size:56px;line-height:1.04;
  letter-spacing:0.3px;display:flex;align-items:center;gap:14px;
  background:linear-gradient(105deg, #f0a8cd 0%, #c9a4dd 34%, #9fcdd9 66%, #7fb5c4 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;
  filter:drop-shadow(0 2px 20px rgba(185,120,210,0.25));
}
.day-title em{font-style:italic;font-weight:500}
.mark-pill{
  flex:0 0 auto;display:inline-flex;align-items:center;gap:9px;
  font-family:var(--sans);font-size:13px;font-weight:600;color:var(--text-soft);
  background:rgba(185,168,224,0.08);border:1px solid rgba(185,168,224,0.3);
  border-radius:30px;padding:9px 18px;cursor:pointer;transition:all .15s ease;
}
.mark-pill:hover{background:rgba(185,168,224,0.16)}
.mark-pill .ring{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--text-soft);flex:0 0 auto}
.mark-pill.done{color:#fff;border-color:var(--lavender);background:rgba(58,122,140,0.28)}
.mark-pill.done .ring{background:var(--lavender);border-color:var(--lavender);box-shadow:0 0 10px rgba(185,168,224,0.7)}
.day-sub{
  font-family:var(--serif);font-style:italic;font-size:23px;color:var(--text-soft);
  margin-bottom:30px;
}

/* activation slot */
.activation{
  background:linear-gradient(135deg, #1b3242 0%, #2d6577 100%);
  border-radius:18px;padding:24px 26px;display:flex;align-items:center;gap:20px;
  margin-bottom:16px;box-shadow:0 14px 34px rgba(80,62,130,0.5);
}
.play-btn{
  width:66px;height:66px;border-radius:50%;flex:0 0 auto;
  background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.55);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:transform .15s ease, background .15s ease;
}
.play-btn:hover{transform:scale(1.05);background:rgba(255,255,255,0.3)}
.play-btn svg{width:22px;height:22px;color:#fff;margin-left:3px}
.activation-text .label{
  font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:rgba(255,255,255,0.82);margin-bottom:4px;
}
.activation-text .title{font-family:var(--serif);font-weight:600;font-size:26px;color:#fff;line-height:1.1}
.activation-text .note{font-family:var(--sans);font-size:13px;color:rgba(255,255,255,0.82);margin-top:3px}

/* audio-player activation (real MP3) */
.audio-player{
  display:flex;align-items:center;gap:20px;
  background:linear-gradient(135deg, #1b3242 0%, #2d6577 100%);
  border-radius:18px;padding:22px 26px;margin-bottom:16px;
  box-shadow:0 14px 34px rgba(80,62,130,0.5);
}
.audio-body{flex:1 1 auto;min-width:0}
.audio-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:3px}
.audio-label{
  font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:rgba(255,255,255,0.82);
}
.audio-time{font-family:var(--sans);font-size:12.5px;color:rgba(255,255,255,0.85);font-variant-numeric:tabular-nums}
.audio-title{font-family:var(--serif);font-weight:600;font-size:25px;color:#fff;line-height:1.1;margin-bottom:12px}
.audio-track{
  height:7px;border-radius:4px;background:rgba(255,255,255,0.25);cursor:pointer;position:relative;overflow:hidden;
}
.audio-fill{height:100%;width:0%;border-radius:4px;background:#fff;box-shadow:0 0 10px rgba(255,255,255,0.6);transition:width .1s linear}

/* video-style activation (meditation embed) */
.activation-head{margin-bottom:14px}
.activation-head .label{
  font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--lavender);margin-bottom:5px;
}
.activation-head .title{font-family:var(--serif);font-weight:600;font-size:27px;color:#fff;line-height:1.1}
.act-video{margin-bottom:14px}
.chapters{list-style:none;margin:0 0 34px;padding:16px 20px;
  background:rgba(185,168,224,0.08);border:1px solid rgba(185,168,224,0.2);border-radius:14px}
.chapters li{display:flex;align-items:baseline;gap:14px;padding:6px 0;font-family:var(--sans)}
.chapters li+li{border-top:1px solid rgba(185,168,224,0.12)}
.chap-time{flex:0 0 auto;font-size:12.5px;font-weight:700;letter-spacing:1px;color:var(--lavender);font-variant-numeric:tabular-nums;min-width:42px}
.chap-label{font-size:14.5px;color:var(--text-soft)}
.chapters.seekable li{transition:background .14s ease;border-radius:8px;margin:0 -8px;padding-left:8px;padding-right:8px}
.chapters.seekable li:hover{background:rgba(185,168,224,0.14)}
.chapters.seekable li:hover .chap-label{color:var(--text)}

/* teaching video inside a tab */
.teach-video{margin:0 0 26px}

/* numbered ritual steps */
.ritual-intro{font-family:var(--sans);font-size:15px;line-height:1.55;color:var(--lavender-soft);font-style:italic;margin-bottom:14px}
.ritual{list-style:none;margin:0 0 26px;padding:0;counter-reset:none}
.ritual li{display:flex;gap:16px;padding:16px 0;border-top:1px solid rgba(185,168,224,0.14);
  font-family:var(--sans);font-size:16px;line-height:1.6;color:var(--text)}
.ritual li:first-child{border-top:none}
.ritual li strong{color:#fff;font-weight:600}
.ritual li em{font-style:italic;color:var(--lavender-soft)}
.ritual-n{
  flex:0 0 auto;width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin-top:2px;
  font-family:var(--sans);font-weight:700;font-size:15px;color:#fff;
  background:linear-gradient(150deg,#2d6577,#143140);

PHASES[0].days[0] = {
  n:1, name:"The Foundation",
  title:"The Foundation, Then Your Plan",
  sub:"Why community, the two ways to build one, and the tool that hands you your plan today.",
  loom:"https://www.loom.com/embed/7ef128ed16ab4e85b16b6deab84cd2ca",
  tabs:[
    {id:"teaching", label:"The Teaching", icon:"\u2726", content:`
      <div class="body-copy">
        <p>Hello beautiful souls.</p>
        <p class="lead">I'm so excited to start this challenge with you. Here's what we're doing. You get to see behind the scenes as I build my own membership, right here, in real time.</p>
        <p>I'm not coming at you as someone who's been on Skool for years with it all figured out. I'm coming from a place of sharing what I've learned from watching what others are doing, and what I've been implementing in my own membership recently. I'm learning as I go. But I'm here to lead you, support you, and share everything I'm learning along the way.</p>
      </div>
      <div class="body-copy">
        <p>So let's get into why I'm so obsessed with memberships.</p>
        <p>When you build a community, you build recurring income. Money that comes in every month without you chasing one-on-one clients constantly. You're not starting from zero every time you want to get paid. You're building a space where you get to share all your gifts, your way, with your people. And once they're in your world, there are infinite ways to help them one-on-one from there.</p>
        <p>I've done the Facebook version. I built a space I genuinely loved and the people in it were everything. But Facebook was too distracting. The noise, the scroll, the everything-else competing for attention. So I went looking for a platform I could move my members to, somewhere that actually held the frequency I wanted. I couldn't find the right one for a long time. Then Skool started changing how the platform works, and I saw it. The possibilities opened up.</p>
      </div>
      <div class="pullquote"><p>Here's what I've always believed. A low-ticket membership is the key. It's the doorway.</p></div>
      <div class="body-copy">
        <p>I had a program called From Chaos to Cashflow, where you build a simple journey for your client starting with one micro offer. A small, easy yes. And when you've got a community, that micro offer gets to live inside it. Someone buys your micro offer and they're automatically dropped into your world. Now they're not a one-time buyer. They're in the room.</p>
      </div>
      <div class="notice">
        <div class="notice-label">You're the host, not the guru</div>
        <p>Your job here isn't to be the guru with all the answers. The guru says look at me, I'm perfect, I know everything. And the second that person takes a day off, the whole thing falls apart because everyone was only connected to the guru. You're not building that. You're the host. Think about the difference between handing your friends a fifty-page slideshow and making them sit through it, versus throwing a barbecue. Music on, drinks out, people talking to each other. Your only job as the host is to set the vibe and create the space where your people connect. Not just with you. With each other.</p>
      </div>
      <div class="body-copy">
        <p>And here's the thing about Skool. It's not a course platform that happens to have a community bolted on. It's a community platform that has courses inside it to give your people value. The community is the point. The courses serve it.</p>
      </div>`},
    {id:"types", label:"The Two Doors", icon:"\u{1F4AB}", content:`
      <div class="body-copy">
        <p>Let's get clear on the types of memberships we're talking about, because the words matter. There are two. A freemium and a paid.</p>
      </div>
      <div class="doors">
        <div class="door">
          <div class="door-name">Freemium</div>
          <span class="door-tag">Free level + two upgrades</span>
          <p>A freemium has a free level. People come in free because they saw something you were promoting. They join, they look around, and while they're in there they start to see what you offer for an upgrade. A freemium has two upgrades. A low-ticket standard, somewhere between five and eight dollars a month. And a premium, somewhere between twenty-seven and ninety-nine a month.</p>
        </div>
        <div class="door">
          <div class="door-name">Paid</div>
          <span class="door-tag">Trial door + levels</span>
          <p>A paid community has no free level. But Skool now offers a seven-day trial, so people still get to come in and experience it before they pay. By the end of the trial, they pay. So when you're promoting a paid community, you're promoting a micro offer to bring them in to try it out. A paid community still has levels too. A standard around five to eight, and a premium from twenty-seven to ninety-nine.</p>
        </div>
      </div>
      <div class="body-copy">
        <p>So both can have a premium. The real difference is the door. One opens to a free level. The other opens to a trial.</p>
      </div>
      <div class="notice">
        <div class="notice-label">Which one's right for you</div>
        <p>If you're new, or you don't have a big following yet, I'd go freemium. Put two or three things in the free level. A challenge. Some audios. Maybe a free three-day workshop. Things you'd happily give to bring people into your world. The difference now is you're bringing them into a safe, controlled space instead of losing them in the noise of Facebook. They come in, they experience your course and your audios, and from there they're warm. They'll either uplevel to standard or go all the way to premium. That's what I recommend if you're starting out.</p>
      </div>
      <div class="body-copy">
        <p>If you're not new, if you've run memberships before, I'd say jump straight into paid. Start with a standard level, five or seven or eight a month, with courses, a library, a challenge, things people can do on their own. Then add a premium level where they get more of you. Your time, your support.</p>
      </div>`},
    {id:"plan", label:"Your Plan", icon:"\u2727", content:`
      <div class="body-copy">
        <p>So that's the foundation. Now for the fun part.</p>
      </div>
      <div class="artifact-cta">
        <div class="label">Day 1 Tool</div>
        <div class="title">Run the builder</div>
        <p>You select your gifts, and it shows you what your community can actually hold. It'll show you what a free version could look like and what a paid version could look like, so you can feel which one fits how you want to work. You're not locking anything in today. You're seeing what's possible. By the end of Day 1, you'll have a plan in your hands. Not just ideas in your head.</p>

  tabs:[
    {id:"teaching", label:"The Teaching", icon:"\u2726", content:`
      <div class="body-copy">
        <p>Hello again, beautiful souls. How are you feeling after yesterday?</p>
        <p class="lead">If you ran the builder, you walked away with a plan and a feel for which door is yours. So today we make it real. We claim your path, get you signed up on Skool, name your group, and get you set to record. This is the day it stops being an idea and starts being a thing that exists.</p>
      </div>
      <div class="notice">
        <div class="notice-label">First, claim your path</div>
        <p>Yesterday you saw the two doors, freemium and paid, and you got a feel for which fits you. I'm not going to run through them again. Today you just pick one and commit. And you're not locked in. You'll change this as you grow. Pricing, tiers, all of it evolves. Just pick the door you're building first. That's all a decision is. Cutting off the other options long enough to actually move.</p>
      </div>
      <div class="body-copy">
        <p>Once you've claimed your path, go sign up for Skool. There's a button in the next tab. It comes with a free trial, so you can get in and look around before you pay a thing. When you sign up, Skool asks which plan you want, Hobby or Pro. I broke those down in the Hobby vs Pro tab so you know which to pick.</p>
      </div>
      <div class="pullquote"><p>Your name can change. Mine has, more times than I can count. What makes people join is the promise underneath it.</p></div>
      <div class="body-copy">
        <p>Now the fun part. Naming it. Let me take the pressure off right away, because naming is where almost everyone freezes. People sit on a blank page for two weeks chasing the perfect name, and that's two weeks their community doesn't exist.</p>
        <p>So before you name anything, get clear on the promise. One line. This is a space for who, to do or become or feel what. Write that down, because you'll come back to it every time you decide what goes inside.</p>
        <p>Then the name gets easier, because now you're naming the feeling of that promise. If you're stuck, here are four directions you can go.</p>
      </div>
      <ol class="ritual">
        <li><span class="ritual-n">1</span><div><strong>Name the feeling.</strong> The energy of being inside. The witchy, magnetic route.</div></li>
        <li><span class="ritual-n">2</span><div><strong>Name the transformation.</strong> What they're becoming or stepping into. The outcome, right on the tin.</div></li>
        <li><span class="ritual-n">3</span><div><strong>Name the room.</strong> A place they belong to. Circle, collective, society, house, table.</div></li>
        <li><span class="ritual-n">4</span><div><strong>Build your own world.</strong> A word that's distinctly yours, that you can grow a whole language around. The strongest long-term play, but it doesn't have to be where you start.</div></li>
      </ol>
      <div class="notice">
        <div class="notice-label">One thing about your URL</div>
        <p>Skool gives you a custom URL. You can change your group name as many times as you want, but be more thoughtful about the URL. A lot of people just use their own name, because no matter how often the group name changes, your name stays the same. If you're not sure yet, leave it on the default and set it once you know.</p>
      </div>
      <div class="body-copy">
        <p>Last setup thing. Sign up for Loom. It's the video tool I'm using right now to record myself and share my screen at the same time. You'll want it for the content we build next week. The free version records short videos, which is plenty to start. Just make the account so you're ready when we get there.</p>
      </div>`},
    {id:"plans", label:"Hobby vs Pro", icon:"\u{1F4AB}", content:`
      <div class="body-copy">
        <p>When you sign up, Skool asks which plan you want. Both give you the exact same features. Unlimited members, courses, videos, the feed, the classroom, the gamification. What changes is the fees and a couple of extras.</p>
      </div>
      <div class="doors">

          <span class="door-tag">$9 / month</span>
          <p>The trade-off is the transaction fee. Skool takes ten percent of any payment you collect through the platform. You also get one admin, just you, and Skool may show your members other suggested communities in their sidebar. Best place to start when you're not making much yet, because ten percent of a little is almost nothing.</p>

          <p>Same features, but the transaction fee drops from ten percent to two point nine. You get unlimited admins so you can bring in help, you can hide those suggested communities, and you can turn on member affiliates, where your members earn a commission you set for referring new people. That last one only exists on Pro.</p>

        <a class="artifact-btn" href="https://www.skool.com/signup?ref=3d4bd5bdcda847a3afcfd90d513f22bf" target="_blank" rel="noopener">Sign Up for Skool \u2192</a>

/* ---- Day 3 — Set the Frequency Before You Build ---- */
PHASES[0].days[2] = {
  n:3, name:"Set the Frequency",
  title:"Set the Frequency Before You Build",
  sub:"You're not late. Shift the comparison, ground, and tour the room you're building.",
  loom:"https://www.loom.com/embed/d0e35112edb64b9d8ce22be43279bf37",
  tabs:[
    {id:"teaching", label:"The Teaching", icon:"\u2726", content:`
      <div class="body-copy">
        <p>Hello beautiful souls. Before we do anything today, I want to talk about something that comes up a lot, especially on a platform like Skool.</p>
        <p class="lead">You get in here, you look around, and the panic sets in. You feel like you're behind. Like you should have done this already. Like you're late to the game and everyone else is so far ahead.</p>
      </div>
      <div class="notice">
        <div class="notice-label">You're not late to the game</div>
        <p>It's so easy to look at what other people are doing and spiral. They already have so much in their community. Who do you think you are, why would anyone join yours, you've barely got anything yet, it's going to take forever to reach their level. Maybe you should just quit. I felt it myself when I started my membership, and I already had courses and hypnosis built. I had to remember: I'm in the exact place I'm meant to be. You're not late. You're exactly where you're supposed to be. You're here now because you've been busy learning and leveling up in other areas of your life, and now you're ready for this.</p>
      </div>
      <div class="body-copy">
        <p>Here's the shift that changed everything for me. When I'd look at those other communities, instead of sinking into jealousy or anxiety, I started shifting it into excitement. Wow, look at what they've built. Look at what's possible. I got excited that I get to create this portal for my people and bring all my gifts into something I actually love hanging out in.</p>
        <p>And the big one, I started celebrating their success. Genuinely. Because when you can walk into a community similar to yours and celebrate what they've built and see it as possibility, the whole frequency changes. It stops being comparison. It becomes opportunity, excitement, motivation.</p>
      </div>
      <div class="pullquote"><p>Take a breath with me. A real one. In through the nose, slow out through the mouth.</p></div>
      <div class="notice">
        <div class="notice-label">Set the frequency</div>
        <p>In a minute you'll get your first real look inside the platform, and the second people see all the buttons and tabs, they go into scramble and try to build everything at once. We're not doing that. You're the host. The host doesn't frantically rearrange the whole house before the party. Before you touch a single setting, set your frequency. You're building something that gets to grow slowly, with the people who show up. Nothing has to be perfect today. It just has to exist. Calm builds better than panic. A community built from scramble feels like scramble. A community built from your essence feels like you.</p>
      </div>
      <div class="pullquote"><p>You're not building a course library. You're building the room where the people who are ready to work with you come to find you.</p></div>
      <div class="body-copy">
        <p>Before I show you around, understand what you're actually building, because it's bigger than a place to post. Your community is where you gather the people who are ready to work with you. On social media they're scattered and distracted. Inside your community they're in a room you control, paying attention, in your world.</p>
        <p>And here's how it compounds. Remember the micro offer from Day 1. It lives inside your community. Someone buys it and they're dropped right into the room. Now they're not a one-time buyer who disappears. They're inside, where they see everything else you offer. The community turns a single small yes into an ongoing relationship.</p>
      </div>
      <div class="section-h">The tour: the three C's</div>
      <div class="body-copy">
        <p>Watch the video for the full walkthrough. Here's the quick map so you know the room.</p>
      </div>
      <ol class="ritual">
        <li><span class="ritual-n">1</span><div><strong>Community.</strong> The feed. Your front room, where you and your members post, with your welcome post pinned at the top. Categories sort the feed. There's a toggle to email all members, save that for the big stuff so it stays special.</div></li>
        <li><span class="ritual-n">2</span><div><strong>Classroom.</strong> Where your courses and resources live. Each one has access settings, open to everyone, locked behind a paid tier, or unlocked at a level. You control who sees what.</div></li>
        <li><span class="ritual-n">3</span><div><strong>Calendar.</strong> Where your events go. Live calls, group sessions. You set who can join, so a premium-only call only shows for premium members.</div></li>
      </ol>
      <div class="body-copy">
        <p>Two back rooms to know about. Your <strong>About page</strong> is what people see before they join, your front door from the outside. We'll build it properly later this week. And <strong>Settings</strong> is the back office, where your pricing, tiers, group name, and your dashboard numbers live. We'll come back to the parts that matter as we need them.</p>
      </div>
      <div class="section-h">Go join a few communities today</div>
      <div class="body-copy">
        <p>One thing I want you to do today, and it ties right back to everything we just talked about. Go to the Discovery section, search your niche, and join two or three free communities. But the frequency you go in with matters.</p>
        <p>Don't go in to spy or copy. Go in from joy. From curiosity. From, these are my people, this is where my soulmate clients are hanging out, and I get to be in community with them. I'm in multiple communities that do similar work to mine, and I'm in there to learn, yes, but mostly to see the possibility and be around like-minded people.</p>
        <p>Here's what happens when you actually get involved. When you comment, ask questions, and help other members from the heart, you get noticed. Someone reads a comment you left and thinks wow, this is amazing. They click your profile, they see you have a membership too, and that's how you get found.</p>
      </div>
      <div class="notice">
        <div class="notice-label">Come from the heart, not the hustle</div>
        <p>We're not going in to spam so people come look at us. That's not the frequency. We're going in to genuinely help and cheer people on because we care. When you truly care about the people and you're cheering them from real excitement, people feel that. They get curious. That frequency is magnetic in a way strategy alone never is. Ten or fifteen minutes a day is plenty. Pop into a couple of communities, like a few things, leave a comment or two that actually helps.</p>
      </div>
      <div class="body-copy">
        <p>Nice bonus. Skool gives you a little fire icon next to your name when you're active. It takes about ten interactions a day, and that includes activity in your own community. It matters, because when people see that fire they trust you. Nobody wants to join a community sitting at a standstill. They want somewhere alive. That fire tells them you show up.</p>
      </div>`},
    {id:"todo", label:"Today's To-Do", icon:"\u2713", content:`
      <div class="body-copy">
        <p>Today is lighter on purpose. You ground, you learn the room, you get familiar. The real building starts tomorrow. Check each off as you go.</p>
      </div>
      <div class="todo-list">
        <label class="todo-item"><input type="checkbox" data-todo="d3-t1"><span class="todo-box"></span><span class="todo-text">Watch the Day 3 video</span></label>
        <label class="todo-item"><input type="checkbox" data-todo="d3-t2"><span class="todo-box"></span><span class="todo-text">Take a breath and set your frequency before you build</span></label>
        <label class="todo-item"><input type="checkbox" data-todo="d3-t3"><span class="todo-box"></span><span class="todo-text">Click around your own Skool, open every tab, get familiar</span></label>
        <label class="todo-item"><input type="checkbox" data-todo="d3-t4"><span class="todo-box"></span><span class="todo-text">Go to Discovery, search your niche, join 2 or 3 free communities from joy</span></label>
        <label class="todo-item"><input type="checkbox" data-todo="d3-t5"><span class="todo-box"></span><span class="todo-text">Leave a couple of comments from the heart, start earning your fire</span></label>
        <label class="todo-item"><input type="checkbox" data-todo="d3-t6"><span class="todo-box"></span><span class="todo-text">Share how the platform felt and the communities you joined</span></label>
      </div>
      <div class="share-note">Come <a href="https://www.skool.com/embody-wealth?c=60932eb0c32f408c8853873d5dfe35f9&s=newest&fl=" target="_blank" rel="noopener">tell us how it felt in the community</a>, and drop the names of the communities you joined so we can go cheer them on too. Excited, overwhelmed, both? Say it out loud so we can move through it together.</div>
      <div class="sig">I believe in you. To living our dreams. \u2014 Aurailia \u2729</div>`}

        <p>Remember the builder you ran on Day 1. That's your map. It already showed you what your community could hold, the offers and resources that come out of your gifts. Pull it back up, because that's the raw material we're shaping today. You already did this work.</p>

      <div class="pullquote"><p>Six shells, organised so your shelf tells a story the moment someone walks in.</p></div>
      <div class="section-h">Aim for six, in rows</div>
      <div class="body-copy">
        <p>Three classrooms is a fine place to start. But if you can, shoot for six. And I don't mean six finished courses. I mean six shells, arranged so your shelf tells a story. Think in rows.</p>
      </div>
      <ol class="ritual">
        <li><span class="ritual-n">1</span><div><strong>Free row (3 things).</strong> The top row is what your free or lower level gets. Three things that welcome people in and give them a real taste.</div></li>
        <li><span class="ritual-n">2</span><div><strong>Paid row (3 things).</strong> The row below is what your paid level gets. Three core things that make upgrading worth it.</div></li>
        <li><span class="ritual-n">3</span><div><strong>Your one-on-ones (1 to 3).</strong> At the very end, a few ways to work with you directly. So people see what they get now, what they get when they upgrade, and how to go deeper.</div></li>
      </ol>
      <div class="body-copy">
        <p>You don't build all of it today. You create the shells, put a banner on each, and bring a little more in each day. That way you always have a map of what's next.</p>
      </div>
      <div class="section-h">The other core classrooms</div>
      <div class="body-copy">
        <p>Alongside your Start Here (see the next tab), think about two more core rooms. One is the main thing you bring people in with, your micro offer, the easy yes that gets people through the door. Another can be a small library. It doesn't have to be big, two or three meditations or hypnosis recordings, or a couple of past workshops. A little collection people can dip into.</p>
      </div>
      <div class="section-h">Your one-on-ones</div>
      <div class="body-copy">
        <p>These are the easy ones, so knock them out fast. They don't need teaching. Each is just a short video on what it is and how to book, either through Skool directly or a link to book on your site. You've got range: lower-ticket like an audit, a strategy session, or a discovery call, and higher-ticket like a signature program or a deep hypnosis journey. If you have a group program coming, add it with the start date, the price, and a link to your landing page. You don't need to add every one-on-one, just pick a few core ones.</p>
      </div>
      <div class="notice">
        <div class="notice-label">On banners</div>
        <p>Each classroom wants a banner, and I don't want you stuck on this. The banner can change any time. We just want to start with something. I love using ChatGPT for my banners and then bringing them into Canva to finish. Make something, drop it on, move on. Done beats perfect here.</p>
      </div>`},
    {id:"starthere", label:"Start Here Classroom", icon:"\u{1F31F}", content:`

        <p>There are two ways to build it, and both are good.</p>

          <p>You introduce yourself and walk them through the three areas: the community feed, the classroom, and the calendar. If that's what you can do today, that's a complete Start Here.</p>
        </div>
        <div class="door">
          <div class="door-name">The fuller way</div>

        <li><span class="ritual-n">3</span><div><strong>How it works.</strong> A quick tour of the classroom, the feed, and the calendar, so nobody feels lost.</div></li>
        <li><span class="ritual-n">4</span><div><strong>The core.</strong> Go deeper into the main thing your community gathers around each month, your signature offering.</div></li>
        <li><span class="ritual-n">5</span><div><strong>The live stuff.</strong> Point them to the calendar and show them the live events, so they know when to show up.</div></li>
        <li><span class="ritual-n">6</span><div><strong>Share the magic.</strong> Invite them to share the community, and introduce your affiliate here if you have one. If you don't, just skip this one.</div></li>
        <li><span class="ritual-n">7</span><div><strong>A first step.</strong> Send them to one specific thing to start with. Not the whole library, one clear starting point so they leave with momentum.</div></li>

  n:5, name:"About and Welcome",

  sub:"Your cover is the sign. Your About page is the promise. Let's build the front door.",
  loom:"LOOM_PLACEHOLDER",
  tabs:[
    {id:"teaching", label:"The Teaching", icon:"\u2726", content:`
      <div class="body-copy">
        <p>Hello beautiful souls. Today we build the front door.</p>
        <p class="lead">You've got your classroom shells and you've started your Start Here. Now we work on the piece that decides whether anyone actually walks in. Your cover and your About page. Most people rush this, and it's honestly one of the most important things you'll do.</p>
      </div>
      <div class="pullquote"><p>Imagine you're building a town. It's empty, and you want to bring people in. So you put up signs so people driving by know your town is even there.</p></div>
      <div class="body-copy">
        <p>Your cover image is that sign. It's the first thing someone sees, and it's what makes them slow down and turn off the road to come look. If the sign is boring or confusing, they drive right past. If it's magnetic, they get curious and they come closer. That's why your cover is one of the most important pieces of your whole community.</p>
        <p>A sign only gets them to the edge of town. Once they're curious enough to look closer, that's your About page. It has to deliver on what the sign promised and show them what's actually inside this beautiful town you've built. Who it's for, what happens here, what they'll get. And your welcome video is where they get to feel you, your essence, before they ever join.</p>
        <p>This is the moment it all comes down to. Someone lands on your About page, and they either feel it and sign up, or they drift off. So we're going to make it really good.</p>
      </div>
      <div class="notice">
        <div class="notice-label">Put your face on the sign</div>
        <p>One thing that matters more than people think: have a photo of you on your cover. People join people. Your face is what builds instant trust and connection at the sign. A beautiful graphic is lovely, but a warm, real photo of you invites people in on a whole other level. Let them see the human they're coming to hang out with.</p>
      </div>
      <div class="section-h">Your cover, the sign</div>
      <div class="body-copy">
        <p>Start with your cover. It doesn't need to be fancy, and it can change any time, so don't get stuck. It needs to be clear and magnetic. People should glance at it and get a feel for what your town is about and who it's for. A clean image in your colours, your community name, a photo of you, and a short line that captures the promise. Make it in Canva, or start it in ChatGPT and finish it in Canva. Get something up, refine it later.</p>
      </div>
      <div class="section-h">Your About page, the promise fulfilled</div>
      <div class="body-copy">
        <p>Now the About page. I don't want you staring at a blank box, so I've made you four templates plus a Claude prompt for each. Head to the next tab. Pick the one that fits your vibe, then either fill it in yourself or let Claude interview you and write it for you.</p>
        <p>Whichever you choose, keep it warm and human, the way you'd talk to someone you genuinely want in your world. And weave your welcome video right into that page.</p>
      </div>
      <div class="section-h">Your welcome video</div>
      <div class="body-copy">
        <p>Inside the About page, add a short welcome video. This is where people feel you. It doesn't need to be long or polished. Two or three minutes is plenty. Say hi, tell them who you are and why you built this space, tell them who it's for, and give them a warm invitation to come in. People join people, so letting them feel your essence here does more than any perfect paragraph.</p>
      </div>
      <div class="notice">
        <div class="notice-label">The auto DM (Pro feature)</div>
        <p>A lovely touch if you're on Skool Pro. You can set up an auto DM, an automatic message that goes out the moment someone joins. So the second they walk into your town, they get a warm hello from you waiting for them. Keep it simple and genuine. Welcome them, tell them you're so glad they're here, and point them to one thing to do first, usually your Start Here. If you're on Hobby you won't have this yet, and that's completely fine, your pinned welcome post does the same job.</p>
      </div>`},
    {id:"templates", label:"About Page Templates", icon:"\u2727", content:`
      <div class="body-copy">
        <p>Four templates, each shaped for soul-led communities like yours. Pick the one that fits your vibe. Then either fill in the brackets yourself, or copy the Claude prompt underneath it, paste it into Claude, and let it interview you and write your page on that template.</p>

      <div class="tmpl">

        <div class="tmpl-sub">For when your journey is the reason people trust you.</div>
        <div class="tmpl-box">I know what it's like to [the struggle your people are living right now].<br><br>[One or two sentences on your own journey through that same struggle.]<br><br>Then [your work, your gift, the shift you found] changed everything. [One real result or moment that proves it.]<br><br>Now I'm here to walk you through the same thing.<br><br>Inside [Community Name] you'll find:<br>\u2728 [Core thing one]<br>\u2728 [Core thing two]<br>\u2728 [Core thing three]<br><br>You don't have to figure this out alone. Come in. \u{1F49B}</div>
        <div class="tmpl-prompt-label">\u2728 Or use the Claude prompt</div>

      </div>

      <div class="tmpl">

        <div class="tmpl-prompt-label">\u2728 Or use the Claude prompt</div>

      </div>

      <div class="tmpl">
        <div class="tmpl-name">3 &middot; The Value Stack</div>
        <div class="tmpl-sub">For when you want them to see clearly everything they get.</div>
        <div class="tmpl-box">[One line naming the transformation they're here for.]<br><br>Here's what's waiting for you inside [Community Name]:<br>\u2728 [Name the actual thing, e.g. "The 7-Day Recalibrate Challenge"] [and the quick result it gives]<br>\u2728 [Name the actual thing, e.g. "Monthly Group Hypnosis"]<br>\u2728 [Name the actual thing, e.g. "Weekly Wealth Frequency Oracle Pulls"]<br>\u2728 [Name the actual thing]<br>\u2728 and more inside \u{1F4AB}<br><br>All of it in one place, for [your price or "less than you'd think"].<br><br>This is where you stop collecting free downloads you never open and start actually doing the work with people beside you.<br><br>Come in and see what's waiting for you. \u{1F49B}</div>
        <div class="tmpl-prompt-label">\u2728 Or use the Claude prompt</div>
        <div class="tmpl-box prompt">You're writing my Skool community's About page using "The Value Stack" structure, where they clearly see everything they get. Warm, clear, human, no jargon, no hype. Important: name the actual things by their real names (like "The 7-Day Recalibrate Challenge" or "Monthly Group Hypnosis"), not vague categories like "nervous system tools." Specific named offers convert, vague benefits don't. Ask me these one at a time and wait for each answer: 1) What's the main transformation your people are here for? 2) What's your community called? 3) What are the actual named things they get inside (list the real names of your challenges, sessions, tools, and offers), and what does each one give them? 4) What's the price, or do you want to keep it soft? Then write my About page in this flow: the transformation line, everything they get as a warm list using the real names with the quick result each gives, an "and more inside" line since there's always more than fits, the price or soft line, a line about actually doing the work together, and an invitation. Keep it in my voice, short sentences, no jargon.</div>
      </div>

      <div class="tmpl">
        <div class="tmpl-name">4 &middot; The Simple Method</div>
        <div class="tmpl-sub">For when your people feel overwhelmed and you're the calm way through.</div>
        <div class="tmpl-box">[What you help with] doesn't have to feel so hard.<br><br>After [your experience or your own journey], I've stripped it down to what actually works.<br><br>Inside [Community Name], we keep it simple:<br>\u2728 [Simple piece one]<br>\u2728 [Simple piece two]<br>\u2728 [Simple piece three]<br><br>No overwhelm. No fifty tabs open. Just a clear path and a community walking it with you.<br><br>Come take the first step. \u{1F49B}</div>
        <div class="tmpl-prompt-label">\u2728 Or use the Claude prompt</div>
        <div class="tmpl-box prompt">You're writing my Skool community's About page using "The Simple Method" structure, for people who feel overwhelmed and need a calm clear way through. Warm, grounding, human, no jargon, no hype. Ask me these one at a time and wait for each answer: 1) What do you help people with, and what makes it feel hard for them right now? 2) What's your experience or your own journey with it? 3) What's your community called? 4) What are the three simple pieces of your path? Then write my About page in this flow: it doesn't have to be so hard, your experience, the three simple pieces, a line about no overwhelm just a clear path with community, and an invitation to take the first step. Keep it in my voice, short sentences, no jargon.</div>
      </div>`},

PHASES[0].days[5] = {
  n:6, name:"Build Day",
  title:"Build Day",
  sub:"What it actually takes to open your doors. It doesn't need to be complicated.",
  loom:"LOOM_PLACEHOLDER",
  tabs:[
    {id:"teaching", label:"The Teaching", icon:"\u2726", content:`
      <div class="body-copy">
        <p>Hello beautiful souls. Today I want to talk about what it actually takes to open the doors, and how to move through the fear that comes up when you do, whether that's today or next week.</p>
        <p class="lead">Everything you've worked on this week has been leading here. And I want to take the pressure all the way off, because opening your doors does not need to be complicated. The version in your head is probably way bigger than what's actually required.</p>
      </div>
      <div class="notice">
        <div class="notice-label">It doesn't need to be complicated</div>
        <p>You do not need a finished, polished, fully-stocked community to open. You need something real and something warm. People aren't joining a perfect archive of content. They're joining you, and the feeling of the space, and the promise of what's coming. If you're feeling like you have so much left to build, take a breath. You have more than enough already.</p>
      </div>
      <div class="section-h">If you're stuck on your classrooms, do this</div>
      <div class="body-copy">
        <p>If you're feeling tangled up in your classrooms, here's all you actually need to start. Just do your Start Here. Get that one classroom going, even simply, even just the welcome video. Then come into the community and share it with us. That alone is enough to have something real and alive.</p>
        <p>Then, when you're ready, add your micro offer. And here's the part that takes the weight off. Your micro offer can be something you already have. You do not have to build it from scratch. A course you made a while ago. A three-part audio series. A workshop you ran once. A meditation bundle. Any of that can become your micro offer. You just drop it into a classroom, and now it's part of your community.</p>
      </div>
      <div class="pullquote"><p>Start Here up and shared, then one micro offer you already have dropped into a classroom. That's a living community with a doorway in.</p></div>
      <div class="body-copy">
        <p>Everything else comes later, a little at a time, as your people show up and tell you what they need. In the video I'll show you exactly how I take something I already have and drop it into a classroom, so you can watch how simple it really is.</p>
      </div>
      <div class="section-h">The threshold</div>
      <div class="body-copy">
        <p>Now the part nobody warns you about. Whenever you go to open your doors, whether that's today or a week from now, the fear comes up right before. It's not ready. Who am I to do this. What if no one comes. Maybe I should wait and make it a little more perfect first.</p>
        <p>I've felt it every single time I've put something into the world. And here's what I've learned. That voice never goes away by waiting. It gets louder. The only thing that moves you through it is going. Being seen before you feel ready, because you'll never feel fully ready, and that's the sign you're right at the edge of something real.</p>
        <p>What you're doing is a kind of birth. Something that came out of your gifts, coming into the world. Breathe there. You get to do this. Not because it's perfect, but because it's yours, and your people are waiting for exactly what only you carry. Done and real beats perfect and invisible, every time.</p>
      </div>
      <div class="notice">
        <div class="notice-label">When you feel ready to open</div>
        <p>Here's the minimum that actually needs to be true. Not a finished community, a real one. Your cover is up with a photo of you on it. Your About page is live. Your welcome post is pinned. Your Start Here exists, even if it's just the welcome video. You have at least one thing in a classroom, which can be that micro offer you already had. And your pricing is set. That's a real, live, joinable community. Everything else comes later.</p>
      </div>
      <div class="body-copy">
        <p>And whenever you cross that line, come tell us. Say the words, my community is live. Drop the link. Let us be the first to walk through your doors and celebrate you.</p>
      </div>`},
    {id:"hypnosis", label:"Going-Live Hypnosis", icon:"\u{1F319}", content:`
      <div class="body-copy">
        <p>A hypnosis to move through the fear of being seen and step into this next version of you, the one who has a live community. Find a quiet moment, put your headphones in, and let it land in your body. Do this before you open your doors, or right after.</p>
      </div>
      <div class="audio-soon">
        <div class="audio-soon-icon">\u{1F319}</div>

      <div class="body-copy">
        <p>When it's here, find somewhere you won't be disturbed, soften your body, and let yourself be guided through releasing the fear and stepping into being seen. You are a woman with a living community. Your people are waiting for you.</p>
      </div>`},
    {id:"eft", label:"Going-Live EFT", icon:"\u2728", content:`
      <div class="body-copy">
        <p>If the fear or resistance comes up in the moment, tap along with this round. It clears the charge fast, right when you need it. Follow the words any time the wobble hits. We tap the karate chop point (side of the hand) for the setup, then move through the points.</p>
      </div>
      <div class="notice">
        <div class="notice-label">The setup, karate chop point (side of the hand)</div>
        <p>Tap the side of your hand and say each of these:<br><br>Even though I'm scared to be seen, and part of me feels like this isn't ready, I deeply and completely love and accept myself.<br><br>Even though this fear of going live is here, and who am I to do this, I choose to honour where I am and go anyway.<br><br>Even though it feels vulnerable to open my doors, I choose to trust that my people are waiting for me, and I'm safe to be seen.</p>
      </div>
      <div class="section-h">Round one, moving through the fear</div>
      <ul class="eft-list">
        <li><span class="eft-pt">Top of head</span> This fear of being seen.</li>
        <li><span class="eft-pt">Eyebrow</span> It's not ready, I'm not ready.</li>
        <li><span class="eft-pt">Side of eye</span> Who am I to put this out there.</li>

/* video modal: opens the Loom in a blurred overlay on tap, one tap to play.
   the iframe is created on open and destroyed on close, so nothing runs
   in the background and scrolling stays smooth. */
function wireVideoModal(stage){
  const watchBtn=stage.querySelector('[data-watch]');
  if(!watchBtn) return;
  const loomUrl=watchBtn.getAttribute('data-loom');
  if(!loomUrl) return;
  watchBtn.onclick=()=>{ openVideoModal(loomUrl); };
}

function openVideoModal(loomUrl){
  const overlay=document.getElementById('video-modal');
  const holder=overlay.querySelector('[data-modal-frame]');
  holder.innerHTML='';
  const ifr=document.createElement('iframe');
  ifr.setAttribute('src', loomUrl);
  ifr.setAttribute('allowfullscreen','');
  ifr.setAttribute('allow','fullscreen; picture-in-picture');
  holder.appendChild(ifr);
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
}

function closeVideoModal(){
  const overlay=document.getElementById('video-modal');
  if(!overlay) return;
  overlay.classList.remove('open');
  const holder=overlay.querySelector('[data-modal-frame]');
  if(holder) holder.innerHTML='';
  document.body.style.overflow='';
}

const pauseSVG = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>';
function fmtTime(s){ if(!isFinite(s)||s<0)s=0; const m=Math.floor(s/60),sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }
function bindAudio(stage){
  const players=stage.querySelectorAll('.audio-player'); if(!players.length) return;
  players.forEach(player=>{
    const el=player.querySelector('audio'); if(!el) return;
    const playBtn=player.querySelector('.play-btn');
    const fill=player.querySelector('.audio-fill');
    const track=player.querySelector('.audio-track');
    const cur=player.querySelector('.audio-cur');
    const dur=player.querySelector('.audio-dur');
    el.addEventListener('loadedmetadata',()=>{ if(dur) dur.textContent=fmtTime(el.duration); });
    el.addEventListener('timeupdate',()=>{
      if(cur) cur.textContent=fmtTime(el.currentTime);
      if(el.duration&&fill) fill.style.width=(el.currentTime/el.duration*100)+'%';
    });
    el.addEventListener('ended',()=>{ if(playBtn) playBtn.innerHTML=playSVG; });
    if(playBtn) playBtn.onclick=()=>{
      if(el.paused){
        // pause any other players on the page first
        stage.querySelectorAll('.audio-player audio').forEach(other=>{ if(other!==el){ other.pause(); }});
        stage.querySelectorAll('.audio-player .play-btn').forEach(b=>{ if(b!==playBtn) b.innerHTML=playSVG; });
        el.play(); playBtn.innerHTML=pauseSVG;
      } else { el.pause(); playBtn.innerHTML=playSVG; }
    };
    if(track) track.onclick=(e)=>{
      const r=track.getBoundingClientRect();
      const pct=Math.min(Math.max((e.clientX-r.left)/r.width,0),1);
      if(el.duration) el.currentTime=pct*el.duration;
    };
    player.querySelectorAll('.chapters.seekable li[data-seek]').forEach(li=>{
      li.style.cursor='pointer';
      li.onclick=()=>{ el.currentTime=+li.dataset.seek; if(el.paused){el.play(); if(playBtn) playBtn.innerHTML=pauseSVG;} };
    });
  });
}

const copySVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';

function boxToText(box){
  // convert <br> to newlines and read plain text, so copied prompt keeps its line breaks
  const clone=box.cloneNode(true);
  const btn=clone.querySelector('.tmpl-copy');
  if(btn) btn.remove();
  clone.querySelectorAll('br').forEach(br=>br.replaceWith('\n'));
  return (clone.textContent||'').replace(/\n{3,}/g,'\n\n').trim();
}

function doCopy(text, done){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done, function(){ fallbackCopy(text, done); });
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, done){
  try{
    const ta=document.createElement('textarea');
    ta.value=text; ta.setAttribute('readonly','');
    ta.style.position='absolute'; ta.style.left='-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    done();
  }catch(e){}
}

function bindCopyButtons(stage){
  stage.querySelectorAll('.tmpl-box').forEach(box=>{
    if(box.querySelector('.tmpl-copy')) return;
    const btn=document.createElement('button');
    btn.className='tmpl-copy';
    btn.innerHTML=copySVG+'<span>Copy</span>';
    btn.addEventListener('click', function(){
      const text=boxToText(box);
      doCopy(text, function(){
        btn.classList.add('copied');
        const label=btn.querySelector('span');
        if(label) label.textContent='Copied';
        setTimeout(function(){
          btn.classList.remove('copied');
          if(label) label.textContent='Copy';
        }, 1600);
      });
    });
    box.appendChild(btn);
  });
}

function footNav(d){
  const prevOk = d.n>0;
  const nextExists = d.n<21;
  const nextOk = nextExists && !isLocked(d.n+1);
  const prevLabel = d.n===1 ? '← Welcome' : (prevOk ? `← Day ${d.n-1}` : '←');
  const nextLabel = d.n===0 ? 'Day 1 →' : (nextExists ? `Day ${d.n+1} →` : '→');
  const done = progress[d.n];
  const locked = isLocked(d.n);
  const bottomMark = (d.isWelcome || locked) ? '' : `<div class="foot-complete"><button class="mark-pill ${done?'done':''}" data-mark><span class="ring"></span>${done?'Completed':'Mark Day '+d.n+' Complete'}</button></div>`;
  return `${bottomMark}<div class="day-foot">
    <button class="nav-btn" data-prev ${prevOk?'':'disabled'}>${prevLabel}</button>
    <button class="nav-btn" data-next ${nextOk?'':'disabled'}>${nextLabel}</button>
  </div>`;
}
/* ---- purple & lavender confetti on completing a day ---- */
const CONFETTI_COLORS = ['#f0a8cd','#c9a4dd','#9fcdd9','#2d6577','#aed6e0','#b9a8e0','#7fb5c4'];
let _confettiPieces=[], _confettiRAF=null, _confettiCanvas=null, _confettiCtx=null;
function _confettiResize(){
  if(!_confettiCanvas) return;
  const dpr=window.devicePixelRatio||1;
  _confettiCanvas.width=window.innerWidth*dpr;
  _confettiCanvas.height=window.innerHeight*dpr;
  _confettiCtx.setTransform(dpr,0,0,dpr,0,0);
}
function fireConfetti(x,y){
  if(!_confettiCanvas){
    _confettiCanvas=document.getElementById('confetti');
    _confettiCtx=_confettiCanvas.getContext('2d');
    _confettiResize();
    window.addEventListener('resize',_confettiResize);
  }
  const cx=(x==null)?window.innerWidth/2:x;
  const cy=(y==null)?window.innerHeight/2:y;
  for(let i=0;i<90;i++){
    const ang=Math.random()*Math.PI*2;
    const speed=4+Math.random()*7;
    _confettiPieces.push({
      x:cx, y:cy,
      vx:Math.cos(ang)*speed,
      vy:Math.sin(ang)*speed-4,
      g:0.18+Math.random()*0.1,
      size:5+Math.random()*6,
      rot:Math.random()*Math.PI,
      vr:(Math.random()-0.5)*0.3,
      color:CONFETTI_COLORS[(Math.random()*CONFETTI_COLORS.length)|0],
      life:0, ttl:70+Math.random()*40,
      shape:Math.random()<0.5?'rect':'circ'
    });
  }
  if(!_confettiRAF) _confettiRAF=requestAnimationFrame(_confettiTick);
}
function _confettiTick(){
  _confettiCtx.clearRect(0,0,_confettiCanvas.width,_confettiCanvas.height);
  for(let i=_confettiPieces.length-1;i>=0;i--){
    const p=_confettiPieces[i];
    p.life++; p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vx*=0.99;
    const alpha=Math.max(0,1-p.life/p.ttl);
    _confettiCtx.save();
    _confettiCtx.globalAlpha=alpha;
    _confettiCtx.translate(p.x,p.y);
    _confettiCtx.rotate(p.rot);
    _confettiCtx.fillStyle=p.color;
    if(p.shape==='rect') _confettiCtx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.55);
    else { _confettiCtx.beginPath(); _confettiCtx.arc(0,0,p.size/2,0,Math.PI*2); _confettiCtx.fill(); }
    _confettiCtx.restore();
    if(p.life>=p.ttl||p.y>window.innerHeight+40) _confettiPieces.splice(i,1);
  }
  if(_confettiPieces.length) _confettiRAF=requestAnimationFrame(_confettiTick);
  else { _confettiRAF=null; _confettiCtx.clearRect(0,0,_confettiCanvas.width,_confettiCanvas.height); }
}

function bindFoot(d){
  const stage=document.getElementById('stage');
  const prev=stage.querySelector('[data-prev]'), next=stage.querySelector('[data-next]');
  const marks=stage.querySelectorAll('[data-mark]');
  if(prev) prev.onclick=()=>{ if(d.n>0){current=d.n-1;openPhaseFor(current);renderStage();renderPath();window.scrollTo({top:0,behavior:'smooth'});} };
  if(next) next.onclick=()=>{ if(d.n<21){current=d.n+1;openPhaseFor(current);renderStage();renderPath();window.scrollTo({top:0,behavior:'smooth'});} };
  marks.forEach(mark=>{
    mark.onclick=()=>{
      const wasDone=!!progress[d.n];
      progress[d.n]=!progress[d.n];
      saveProgress(progress);
      if(!wasDone){
        const r=mark.getBoundingClientRect();
        fireConfetti(r.left+r.width/2, r.top+r.height/2);
      }
      renderStage(); renderPath();
    };
  });
}
function openPhaseFor(n){
  PHASES.forEach((ph,pi)=>{ if(ph.days.some(d=>d.n===n)) collapsed[pi]=false; });
}

/* smart entry: newcomers land on Welcome; returning visitors resume on the latest released, unfinished day */
(function init(){
  const started = Object.keys(progress).some(k=>k!=='0' && progress[k]);
  if(!started || RELEASED_DAYS<1){
    current = 0;
  } else {
    const firstUnfinished = flatDays.find(d=>!isLocked(d.n) && d.tabs.length>0 && !progress[d.n]);
    current = firstUnfinished ? firstUnfinished.n : RELEASED_DAYS;
  }
  openPhaseFor(current);
  renderPath();
  renderStage();

  // modal close: backdrop, close button, and Escape key
  document.querySelectorAll('[data-modal-close]').forEach(el=>{
    el.addEventListener('click', closeVideoModal);
  });
  document.addEventListener('keydown', function(e){
    if(e.key==='Escape') closeVideoModal();
  });
})();
</script>
